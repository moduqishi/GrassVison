{% extends "base.html" %}
{% block title %}在线测试{% endblock %}
{% block content %}
<h1>🧪 在线测试</h1>
<div x-data="playground()">
    <div class="form-group"><label>增强模型</label><select class="input" x-model="model"><option value="">-- 选择 --</option><template x-for="m in modelList"><option :value="m" x-text="m"></option></template></select></div>
    <div class="form-group"><label>用户问题</label><textarea class="input" x-model="question" rows="3" placeholder="请输入你的问题..."></textarea></div>
    <div class="form-group"><label>上传图片（可多选）</label><input type="file" multiple accept="image/*" @change="onFilesChange"></div>
    <div class="form-group"><label><input type="checkbox" x-model="stream"> 流式输出</label></div>
    <div class="form-actions">
        <button class="btn btn-primary" @click="sendTest()" :disabled="sending">发送测试</button>
    </div>
    <div x-show="debugInfo" class="card" style="margin-top:16px">
        <h3>调试信息</h3>
        <table class="info-table">
            <tr><td>检测到图片</td><td x-text="debugInfo.hasImages"></td></tr>
            <tr><td>源渠道</td><td x-text="debugInfo.sourceProvider"></td></tr>
            <tr><td>源模型</td><td x-text="debugInfo.sourceModel"></td></tr>
            <tr><td>视觉渠道</td><td x-text="debugInfo.visionProvider"></td></tr>
            <tr><td>视觉模型</td><td x-text="debugInfo.visionModel"></td></tr>
            <tr><td>总耗时</td><td x-text="debugInfo.elapsed + 's'"></td></tr>
        </table>
    </div>
    <div x-show="response" class="card" style="margin-top:16px">
        <h3>回答</h3>
        <pre class="response-box" x-text="response"></pre>
    </div>
</div>
<script>
function playground() {
    return {
        modelList:{{ models | tojson }}, model:'', question:'', files:[], stream:false, sending:false, response:'', debugInfo:null,
        onFilesChange(e){ this.files=Array.from(e.target.files); },
        async sendTest(){
            if(!this.model) return showToast('请选择模型','error');
            this.sending=true; this.response=''; this.debugInfo=null;
            const messages=[{role:'user',content:[]}];
            if(this.question) messages[0].content.push({type:'text',text:this.question});
            for(const f of this.files){
                const b64=await new Promise(r=>{const re=new FileReader();re.onload=e=>r(e.target.result.split(',')[1]);re.readAsDataURL(f);});
                messages[0].content.push({type:'image_url',image_url:{url:`data:image/png;base64,${b64}`}});
            }
            const start=Date.now();
            try{ const r=await fetch('/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:this.model,messages,stream:this.stream})});
                if(this.stream){
                    this.response='';
                    const reader=r.body.getReader(); const dec=new TextDecoder();
                    while(true){ const {done,value}=await reader.read(); if(done) break; this.response+=dec.decode(value,{stream:true}); }
                }else{ const d=await r.json(); this.response=d.choices?.[0]?.message?.content||JSON.stringify(d); }
                this.debugInfo={hasImages:this.files.length>0,sourceProvider:'?',sourceModel:'?',visionProvider:'?',visionModel:'?',elapsed:((Date.now()-start)/1000).toFixed(2)};
            }catch(e){ this.response='错误: '+e.message; }
            this.sending=false;
        }
    }
}
</script>
{% endblock %}
