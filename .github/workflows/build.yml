name: Build & Pre-release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag override (e.g., v1.2.3)"
        required: false
        default: ""

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            suffix: ""
            sep: ":"
            fmt: gztar
            ext: tar.gz
          - os: macos-latest
            target: macos-arm64
            suffix: ""
            sep: ":"
            fmt: gztar
            ext: tar.gz
          - os: windows-latest
            target: windows-x64
            suffix: ".exe"
            sep: ";"
            fmt: zip
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --onefile
          --name grassvision-${{ matrix.target }}
          --add-data "templates${{ matrix.sep }}templates"
          --add-data "static${{ matrix.sep }}static"
          --add-data "config${{ matrix.sep }}config"
          --add-data "config.example.yaml${{ matrix.sep }}."
          --hidden-import uvicorn.logging
          --hidden-import uvicorn.loops.auto
          --hidden-import uvicorn.protocols.http.auto
          --hidden-import uvicorn.protocols.websockets.auto
          --hidden-import jinja2.ext
          --hidden-import app.main
          --hidden-import app.config
          --hidden-import app.schemas
          --hidden-import app.proxy
          --hidden-import app.vision
          --hidden-import app.image_utils
          --hidden-import app.providers
          --hidden-import app.auth
          --hidden-import app.admin
          --hidden-import app.stats
          --hidden-import app.errors
          --hidden-import app.image_cache
          run.py

      - name: Package archive with pre-seeded files
        run: |
          import os, shutil
          from pathlib import Path

          target = "${{ matrix.target }}"
          suffix = "${{ matrix.suffix }}"
          fmt = "${{ matrix.fmt }}"

          staging = Path.cwd() / "staging"
          if staging.exists():
              shutil.rmtree(staging)
          staging.mkdir()

          # 1. Copy executable
          exe = Path("dist") / f"grassvision-{target}{suffix}"
          shutil.copy2(exe, staging / exe.name)
          os.chmod(staging / exe.name, 0o755)

          # 2. Copy config.yaml (from example — user edits before running)
          shutil.copy2(Path("config.example.yaml"), staging / "config.yaml")

          # 3. Copy config/prompts/ (pre-seeded, readable)
          staging_prompts = staging / "config" / "prompts"
          staging_prompts.mkdir(parents=True)
          prompts_dir = Path.cwd() / "config" / "prompts"
          for f in sorted(prompts_dir.iterdir()):
              if f.is_file() and f.suffix == ".txt":
                  shutil.copy2(f, staging_prompts / f.name)

          # 4. Create logs/ (empty — program writes here at runtime)
          (staging / "logs").mkdir()

          print("=== Staging contents ===")
          for path in sorted(staging.rglob("*")):
              print(f"  {path.relative_to(staging)}")

          archive_path = shutil.make_archive(
              base_name=str(Path.cwd() / f"grassvision-{target}"),
              format=fmt,
              root_dir=str(staging),
          )
          print(f"Created: {archive_path} ({os.path.getsize(archive_path)} bytes)")
        shell: python

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grassvision-${{ matrix.target }}
          path: grassvision-${{ matrix.target }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly-$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "GrassVision ${{ steps.tag.outputs.tag }}"
          body: |
            ## GrassVision ${{ steps.tag.outputs.tag }}

            ⚠️ **Pre-release** — 自动构建，未充分测试。

            ### 下载

            | 平台 | 压缩包 |
            |------|--------|
            | Linux x64 | `grassvision-linux-x64.tar.gz` |
            | macOS ARM64 | `grassvision-macos-arm64.tar.gz` |
            | Windows x64 | `grassvision-windows-x64.zip` |

            ### 使用

            1. 下载对应平台的压缩包，解压到任意目录
            2. 编辑 `config.yaml`，填入 API Key 等信息
            3. 运行 `grassvision`（或 `grassvision.exe`）
          prerelease: true
          fail_on_unmatched_files: false
          files: release-assets/*
